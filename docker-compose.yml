services:
  mysql:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: pet_gen_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network

  backend:
    build: ./backend
    container_name: laravel_app
    depends_on:
      - mysql
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    networks:
      - app_network

  nginx:
    image: nginx:latest
    container_name: nginx_server
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app_network

  frontend:
    build: ./frontend
    container_name: next_app
    depends_on:
      - nginx
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - app_network

  adminer:
    image: adminer
    container_name: adminer
    restart: always
    environment:
      ADMINER_DESIGN: "nette"
      ADMINER_DEFAULT_SERVER: "mysql"
    ports:
      - "8081:8080"
    depends_on:
      - mysql
    networks:
      - app_network

volumes:
  mysql_data:

networks:
  app_network: